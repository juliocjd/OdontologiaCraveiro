<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,follow" />
    <meta
      name="description"
      content="A página solicitada não foi encontrada no site da Odonto em Casa."
    />
    <title>Página não encontrada | Odonto em Casa</title>
    <style>
      :root {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #22312d;
        background: #f4f7f2;
      }

      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        margin: 0;
        padding: 24px;
      }

      main {
        width: min(720px, 100%);
        padding: clamp(24px, 5vw, 48px);
        border: 1px solid rgba(34, 49, 45, 0.16);
        border-radius: 8px;
        background: #fffdf8;
      }

      h1 {
        margin: 0;
        color: #173c34;
        font-size: clamp(2rem, 6vw, 4rem);
        line-height: 1.05;
      }

      p {
        color: #5f6f69;
        line-height: 1.6;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 22px;
      }

      a {
        min-height: 48px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 18px;
        border-radius: 8px;
        color: #173c34;
        font-weight: 800;
        text-decoration: none;
      }

      .primary {
        background: #245c4f;
        color: #fffdf8;
      }

      .secondary {
        border: 1px solid rgba(34, 49, 45, 0.16);
        background: #fff;
      }
    </style>
  </head>
  <body>
    <main>
      <p>Odonto em Casa</p>
      <h1>Página não encontrada</h1>
      <p>
        A URL acessada não existe neste site. Como o domínio pode ter tido
        conteúdo antigo indexado, páginas inexistentes não são redirecionadas
        automaticamente para a home.
      </p>
      <div class="actions">
        <a class="secondary" href="/">Voltar para a home</a>
        <a
          class="primary"
          href="https://wa.me/5544999844607?text=Ol%C3%A1%2C%20gostaria%20de%20agendar%20uma%20avalia%C3%A7%C3%A3o%20odontol%C3%B3gica%20domiciliar."
          >Agendar avaliação pelo WhatsApp</a
        >
      </div>
    </main>
  </body>
</html>
